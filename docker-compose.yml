version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: pose_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - CUDA_VISIBLE_DEVICES=0
    networks:
      - pose_network
    command: uvicorn backend.app:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pose_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - pose_network
    environment:
      - REACT_APP_API_URL=http://backend:8000

  nginx:
    image: nginx:alpine
    container_name: pose_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - pose_network

networks:
  pose_network:
    driver: bridge

volumes:
  pose_data:
  model_cache:
